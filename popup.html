<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickTimer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0e0e11;
      --surface: #18181d;
      --border: #2a2a33;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.12);
      --text: #f0f0f0;
      --muted: #6b6b7a;
      --on-green: #22c55e;
      --off-red: #ef4444;
    }

    body {
      width: 240px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      padding: 20px;
      user-select: none;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .version {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 18px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label span:first-child {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .status-text {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .status-text.on {
      color: var(--on-green);
    }

    .status-text.off {
      color: var(--off-red);
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      transition: background 0.3s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
    }

    .toggle-switch input:checked + .slider {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid var(--on-green);
    }

    .toggle-switch input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--on-green);
    }

    .info-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .info-box span {
      color: var(--accent);
    }

    /* Pulse dot when enabled */
    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--on-green);
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    .pulse-dot.hidden {
      background: var(--muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-mark">CT</div>
    <div class="title-block">
      <div class="title">ClickTimer</div>
      <div class="version">v0.1.0</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <div class="toggle-label">
      <span>Extension</span>
      <span class="status-text on" id="statusText">
        <span class="pulse-dot" id="pulseDot"></span>Active
      </span>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleInput" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="info-box">
    Time durations on any page become <span>clickable timers</span>. Works on recipes, workouts, tutorials and more.
  </div>

  <div class="footer">clicktimer &middot; dominicware</div>

  <script src="popup.js"></script>
</body>
</html>
