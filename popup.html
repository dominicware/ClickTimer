<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickTimer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f2ee;
      --surface: #ede9e3;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text: rgba(0,0,0,0.85);
      --muted: rgba(0,0,0,0.40);
      --on-green: #2d6a3f;
      --off-red: #8b2020;
    }

    body {
      width: 240px;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      padding: 18px 20px;
      user-select: none;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-style: italic;
      font-size: 22px;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .version {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-family: system-ui, sans-serif;
    }

    .divider {
      height: 1px;
      background: var(--border-strong);
      margin-bottom: 16px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label span:first-child {
      font-size: 13px;
      font-style: italic;
      color: var(--text);
    }

    .status-text {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
      transition: color 0.3s ease;
    }

    .status-text.on  { color: var(--on-green); }
    .status-text.off { color: var(--off-red); }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 24px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
    }

    .toggle-switch input:checked + .slider {
      background: rgba(0,0,0,0.85);
      border-color: rgba(0,0,0,0.85);
    }

    .toggle-switch input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--bg);
    }

    /* Theme selector */
    .section-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: system-ui, sans-serif;
    }

    .theme-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 16px;
    }

    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--muted);
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 11px;
      padding: 7px 4px;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
      text-align: center;
    }

    .theme-btn:hover {
      border-color: rgba(0,0,0,0.4);
      color: var(--text);
    }

    .theme-btn.active {
      border-color: rgba(0,0,0,0.85);
      background: rgba(0,0,0,0.85);
      color: var(--bg);
    }

    .info-box {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
    }

    .info-box span {
      color: var(--text);
      font-weight: 700;
    }

    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--on-green);
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    .pulse-dot.hidden {
      background: var(--muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
      font-family: system-ui, sans-serif;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">ClickTimer</div>
    <div class="version">v1.0.0</div>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <div class="toggle-label">
      <span>Extension</span>
      <span class="status-text on" id="statusText">
        <span class="pulse-dot" id="pulseDot"></span>Active
      </span>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleInput" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <div class="section-label">Panel Theme</div>
  <div class="theme-row">
    <button class="theme-btn" data-theme="light">Light</button>
    <button class="theme-btn active" data-theme="auto">Auto</button>
    <button class="theme-btn" data-theme="dark">Dark</button>
  </div>

  <div class="info-box">
    Time durations on any page become <span>clickable timers</span>. Works on recipes, workouts, tutorials and more.
  </div>

  <div class="footer">clicktimer &middot; dominicware</div>

  <script src="popup.js"></script>
</body>
</html>
